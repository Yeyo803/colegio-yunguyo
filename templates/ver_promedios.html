<!DOCTYPE html>
<html>
<head>

<title>Promedios</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{

        min-height:100vh;

        background-image:
            linear-gradient(
                rgba(0,0,0,0.45),
                rgba(0,0,0,0.45)
            ),
            url("{{ url_for('static', filename='img/fondo.jpg') }}");

        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;

        padding:30px;
        color:white;
    }

    .glass-card{

        max-width:1200px;
        margin:auto;

        background:rgba(255,255,255,0.12);

        backdrop-filter:blur(18px);
        -webkit-backdrop-filter:blur(18px);

        border:1px solid rgba(255,255,255,0.25);

        border-radius:25px;

        padding:40px;

        box-shadow:0 8px 32px rgba(0,0,0,0.30);
    }

    h1{
        text-align:center;
        font-weight:700;
        margin-bottom:20px;
    }

    h3{
        margin-top:30px;
        padding:10px;
        border-radius:10px;
        background:rgba(0, 2, 5, 0.8);
    }

    table{
        background:rgba(255,255,255,0.10);
        color:white;
        border-radius:10px;
        overflow:hidden;
    }

    th{
        background:rgba(255,255,255,0.2);
        color:white;
    }

    td{
        color:white;
    }

</style>

</head>

<body>

<div class="glass-card">

<h1>📊 Promedios por Curso</h1>

{% for curso, lista in cursos.items() %}

    <h3>
        {{ curso }}
    </h3>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Promedio</th>
            </tr>
        </thead>

        <tbody>

            {% for e in lista %}

            <tr>

                <td>{{ e[0] }}</td>
                <td>{{ e[1] }}</td>
                <td>
                    {% if e[2] == 0 %}
                        SIN NOTAS
                    {% else %}
                        {{ e[2] }}
                    {% endif %}
                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

{% endfor %}

</div>

</body>
</html>
