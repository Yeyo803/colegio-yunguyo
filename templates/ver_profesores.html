<!DOCTYPE html>
<html>
<head>

<title>Profesores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{

        min-height:100vh;

        background-image:
            linear-gradient(
                rgba(0,0,0,0.45),
                rgba(0,0,0,0.45)
            ),
            url("{{ url_for('static', filename='img/fondo.jpg') }}");

        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;

        display:flex;
        justify-content:center;
        align-items:flex-start;

        padding:30px;

        color:white;
    }

    .glass-container{

        width:100%;
        max-width:1000px;

        background:rgba(255,255,255,0.12);

        backdrop-filter:blur(18px);
        -webkit-backdrop-filter:blur(18px);

        border:1px solid rgba(255,255,255,0.25);

        border-radius:30px;

        padding:40px;

        box-shadow:0 8px 32px rgba(0,0,0,0.30);
    }

    h1{
        text-align:center;
        font-weight:700;
        margin-bottom:25px;
        color:white;
    }

    table{
        color:white;
    }

    .table thead{
        background:rgba(0,0,0,0.4);
        color:white;
    }

    .table tbody tr:hover{
        background:rgba(255,255,255,0.08);
        transition:0.2s;
    }

    .badge{
        font-weight:600;
        padding:6px 10px;
        border-radius:10px;
    }

</style>

</head>

<body>

<div class="glass-container">

    <h1>📚 Lista de Profesores</h1>

    <div class="mb-3">
        <a href="/agregar_profesor" class="btn btn-success">
            ➕ Agregar Profesor
        </a>
    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
            <tr>
                <th>Profesor</th>
                <th>Materias</th>
                <th>Cursos</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>

        {% for id, p in profesores.items() %}

        <tr>

            <td>{{ p.nombre }}</td>

            <td>
                {% for m in p.materias %}
                    <span class="badge bg-primary">{{ m }}</span>
                {% endfor %}
            </td>

            <td>
                {% for c in p.cursos %}
                    <span class="badge bg-success">{{ c }}</span>
                {% endfor %}
            </td>

            <td>

                <a href="/editar_profesor/{{ id }}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a href="/eliminar_profesor/{{ id }}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar profesor?')">
                    Eliminar
                </a>

            </td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
