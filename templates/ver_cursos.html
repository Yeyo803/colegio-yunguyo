<!DOCTYPE html>
<html>
<head>
    <title>Cursos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h1>Cursos</h1>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>ID</th>
                <th>Grado</th>
                <th>Paralelo</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>

        {% for c in cursos %}
        <tr>
            <td>{{ c[0] }}</td>
            <td>{{ c[1] }}</td>
            <td>{{ c[2] }}</td>

            <td>
                <a href="/eliminar_curso/{{ c[0] }}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar este curso?')">
                    Eliminar
                </a>
            </td>
        </tr>
        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
