<!DOCTYPE html>
<html>
<head>

    <title>Panel Profesor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background-image:
                linear-gradient(
                    rgba(0,0,0,0.45),
                    rgba(0,0,0,0.45)
                ),
                url("{{ url_for('static', filename='img/fondo.jpg') }}");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            display:flex;
            justify-content:center;
            align-items:flex-start;

            padding:30px;
        }

        /* GLASS CONTAINER */

        .glass-container{

            width:100%;
            max-width:1000px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.25);

            border-radius:30px;

            padding:40px;

            color:white;

            box-shadow:0 8px 32px rgba(0,0,0,0.30);
        }

        .glass-container h1{
            font-weight:700;
            text-align:center;
            margin-bottom:20px;
        }

        .btn{
            border-radius:12px;
            font-weight:600;
        }

        .btn:hover{
            transform:translateY(-3px);
            transition:0.2s;
        }

    </style>

</head>

<body>

<div class="glass-container">

    <h1>
        Bienvenido {{ profesor[0] }} {{ profesor[1] }}
    </h1>

    <hr>

    <h3 class="mb-4">Opciones</h3>

    <div class="row">

        <div class="col-md-6 mb-3">
            <a href="/ver_materias/{{ id_profesor }}" class="btn btn-primary w-100">
                Ver Materias
            </a>
        </div>

        <div class="col-md-6 mb-3">
            <a href="/ver_estudiantes_profesor/{{ id_profesor }}" class="btn btn-info w-100">
                Ver Estudiantes
            </a>
        </div>

        <div class="col-md-6 mb-3">
            <a href="/ver_representantes/{{ id_profesor }}" class="btn btn-warning w-100">
                Delegado y Codelegado
            </a>
        </div>

        <div class="col-md-6 mb-3">
            <a href="/registrar_notas/{{ id_profesor }}" class="btn btn-success w-100">
                Registrar Notas
            </a>
        </div>

    </div>

</div>

</body>
</html>
