<!DOCTYPE html>
<html>
<head>

    <title>Editar Profesor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background-image:
                linear-gradient(
                    rgba(0,0,0,0.45),
                    rgba(0,0,0,0.45)
                ),
                url("{{ url_for('static', filename='img/fondo.jpg') }}");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;
        }

        .glass-card{

            width:100%;
            max-width:800px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.25);

            border-radius:25px;

            padding:40px;

            color:white;

            box-shadow:0 8px 32px rgba(0,0,0,0.30);
        }

        h2{
            text-align:center;
            font-weight:700;
            margin-bottom:25px;
        }

        label{
            font-weight:500;
            color:rgba(255,255,255,0.9);
        }

        .form-control,
        .form-select{

            background:rgba(255,255,255,0.15);
            border:none;
            color:white;
        }

        .form-control:focus,
        .form-select:focus{
            box-shadow:none;
            border:1px solid rgba(255,255,255,0.4);
        }

        option{
            color:black;
        }

        button{
            border:none;
            border-radius:12px;
            padding:12px;
            font-weight:600;
        }

        hr{
            border-color:rgba(255,255,255,0.2);
        }

    </style>

</head>

<body>

<div class="glass-card">

    <h2>✏️ Editar Profesor</h2>

    <form method="POST" action="/actualizar_profesor/{{ profesor[0] }}">

        <!-- DATOS BÁSICOS -->
        <label>Nombre</label>
        <input class="form-control mb-3"
               name="nombre"
               value="{{ profesor[1] }}"
               required>

        <label>Apellido</label>
        <input class="form-control mb-3"
               name="apellido"
               value="{{ profesor[2] }}"
               required>

        <label>CI</label>
        <input class="form-control mb-3"
               name="ci"
               value="{{ profesor[3] }}"
               required>

        <label>Contraseña</label>
        <input class="form-control mb-3"
               name="password"
               value="{{ profesor[4] }}"
               required>

        <hr>

        <!-- MATERIAS -->
        <label>Materias</label>
        <select class="form-select mb-3" name="materias" multiple required>

            {% for id, nombre in materias %}
            <option value="{{ id }}">
                {{ nombre }}
            </option>
            {% endfor %}

        </select>

        <!-- CURSOS -->
        <label>Cursos</label>
        <select class="form-select mb-4" name="cursos" multiple required>

            {% for id, grado, paralelo in cursos %}
            <option value="{{ id }}">
                {{ grado }} {{ paralelo }}
            </option>
            {% endfor %}

        </select>

        <button class="btn btn-primary w-100">
            💾 Guardar Cambios
        </button>

    </form>

</div>

</body>
</html>
