<!DOCTYPE html>
<html>
<head>

    <title>Login Estudiante</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background-image:
                linear-gradient(
                    rgba(0,0,0,0.45),
                    rgba(0,0,0,0.45)
                ),
                url("{{ url_for('static', filename='img/fondo.jpg') }}");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        /* CARD GLASS */

        .glass-card{

            width:100%;
            max-width:420px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.25);

            border-radius:25px;

            padding:35px;

            color:white;

            box-shadow:0 8px 32px rgba(0,0,0,0.30);
        }

        .glass-card h2{
            text-align:center;
            font-weight:700;
            margin-bottom:20px;
        }

        label{
            color:white;
            font-weight:500;
        }

        .form-control{

            background:rgba(255,255,255,0.15);
            border:none;
            color:white;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,0.7);
        }

        .form-control:focus{
            background:rgba(255,255,255,0.20);
            color:white;
            box-shadow:none;
        }

        .btn-custom{
            border:none;
            border-radius:12px;
            padding:10px;
            font-weight:600;
        }

    </style>

</head>

<body>

    <div class="glass-card">

        <h2>Estudiante</h2>

        <form action="/validar_estudiante" method="POST">

            <label>CI</label>

            <input
                type="text"
                name="ci"
                class="form-control mb-3"
                placeholder="Ingrese su CI"
                required>

            <button
                type="submit"
                class="btn btn-primary btn-custom w-100">

                Ingresar

            </button>

        </form>

    </div>

</body>
</html>
