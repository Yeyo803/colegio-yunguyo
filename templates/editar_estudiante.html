<!DOCTYPE html>
<html>
<head>

    <title>Editar Estudiante</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background-image:
                linear-gradient(
                    rgba(0,0,0,0.45),
                    rgba(0,0,0,0.45)
                ),
                url("{{ url_for('static', filename='img/fondo.jpg') }}");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;
        }

        .glass-card{

            width:100%;
            max-width:700px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.25);

            border-radius:25px;

            padding:40px;

            color:white;

            box-shadow:0 8px 32px rgba(0,0,0,0.30);
        }

        h2{
            text-align:center;
            font-weight:700;
            margin-bottom:25px;
        }

        label{
            font-weight:500;
            color:rgba(255,255,255,0.9);
        }

        .form-control,
        .form-select{

            background:rgba(255,255,255,0.15);
            border:none;
            color:white;
        }

        .form-control:focus,
        .form-select:focus{
            box-shadow:none;
            border:1px solid rgba(255,255,255,0.4);
        }

        option{
            color:black;
        }

        .btn{
            border:none;
            border-radius:12px;
            padding:10px;
            font-weight:600;
        }

    </style>

</head>

<body>

<div class="glass-card">

    <h2>✏️ Editar Estudiante</h2>

    <form action="/actualizar_estudiante" method="POST">

        <input type="hidden"
               name="id_estudiante"
               value="{{ estudiante[0] }}">

        <div class="mb-3">
            <label>CI</label>
            <input type="text"
                   name="ci"
                   value="{{ estudiante[1] }}"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text"
                   name="nombre"
                   value="{{ estudiante[2] }}"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Apellido</label>
            <input type="text"
                   name="apellido"
                   value="{{ estudiante[3] }}"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Contraseña</label>
            <input type="text"
                   name="password"
                   value="{{ estudiante[4] }}"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Curso</label>
            <select name="id_curso" class="form-select">
                {% for c in cursos %}
                <option value="{{ c[0] }}"
                    {% if c[0] == estudiante[5] %}selected{% endif %}>
                    {{ c[1] }} {{ c[2] }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-4">
            <label>Fecha de Ingreso</label>
            <input type="date"
                   name="fecha_ingreso"
                   value="{{ estudiante[6] }}"
                   class="form-control"
                   required>
        </div>

        <div class="d-flex gap-2">

            <button type="submit"
                    class="btn btn-success w-100">
                💾 Guardar
            </button>

            <a href="/ver_estudiantes"
               class="btn btn-secondary w-100">
                Cancelar
            </a>

        </div>

    </form>

</div>

</body>
</html>
