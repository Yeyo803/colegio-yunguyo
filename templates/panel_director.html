<!DOCTYPE html>
<html>
<head>

    <title>Panel Director</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background-image:
                linear-gradient(
                    rgba(0,0,0,0.45),
                    rgba(0,0,0,0.45)
                ),
                url("{{ url_for('static', filename='img/fondo.jpg') }}");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;
        }

        .glass-container{

            width:100%;
            max-width:1100px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.25);

            border-radius:30px;

            padding:50px;

            color:white;

            box-shadow:0 8px 32px rgba(0,0,0,0.30);
        }

        h1{
            text-align:center;
            font-weight:700;
            margin-bottom:30px;
        }

        .btn-card{

            border-radius:18px;
            padding:25px;
            font-weight:600;
            font-size:1.1rem;

            transition:0.3s;
        }

        .btn-card:hover{
            transform:translateY(-8px);
            box-shadow:0 15px 30px rgba(0,0,0,0.3);
        }

    </style>

</head>

<body>

<div class="glass-container">

    <h1>👨‍💼 Bienvenido {{ director[0] }} {{ director[1] }}</h1>

    <div class="row">

        <div class="col-md-6 mb-3">
            <a href="/ver_estudiantes" class="btn btn-primary btn-card w-100">
                📚 Ver Estudiantes
            </a>
        </div>

        <div class="col-md-6 mb-3">
            <a href="/ver_promedios" class="btn btn-success btn-card w-100">
                📊 Ver Promedios
            </a>
        </div>

        <div class="col-md-6 mb-3">
            <a href="/ver_aprobados" class="btn btn-warning btn-card w-100">
                🧾 Aprobados / Reprobados
            </a>
        </div>

        <div class="col-md-6 mb-3">
            <a href="/permisos_notas" class="btn btn-danger btn-card w-100">
                🔐 Permisos de Notas
            </a>
        </div>

        <div class="col-md-12 mb-3">
            <a href="/ver_profesores" class="btn btn-dark btn-card w-100">
                👨‍🏫 Ver Profesores
            </a>
        </div>

    </div>

</div>

</body>
</html>
