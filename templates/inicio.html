<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema de Gestión Académica</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background-image:
                linear-gradient(
                    rgba(0,0,0,0.45),
                    rgba(0,0,0,0.45)
                ),
                url("{{ url_for('static', filename='img/fondo.jpg') }}");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;
        }

        /* CONTENEDOR PRINCIPAL */

        .glass-container{

            width:100%;
            max-width:1200px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.25);

            border-radius:30px;

            padding:50px;

            box-shadow:
                0 8px 32px rgba(0,0,0,0.30);
        }

        /* LOGO */

        .logo{

            width:140px;

            filter:drop-shadow(0 0 10px rgba(255,255,255,0.4));
        }

        /* TITULOS */

        .titulo{

            color:white;

            font-weight:700;

            margin-top:15px;
        }

        .subtitulo{

            color:rgba(255,255,255,0.85);

            font-size:1.3rem;
        }

        .linea{

            width:180px;
            height:4px;

            background:#0d6efd;

            border-radius:10px;

            margin:20px auto;
        }

        /* TARJETAS */

        .card-glass{

            background:rgba(255,255,255,0.18);

            backdrop-filter:blur(12px);

            border:1px solid rgba(255,255,255,0.20);

            border-radius:20px;

            color:white;

            transition:0.3s;

            height:100%;
        }

        .card-glass:hover{

            transform:translateY(-10px);

            box-shadow:
                0 15px 30px rgba(0,0,0,0.25);
        }

        .icono{

            font-size:4rem;
        }

        .card-glass p{

            color:rgba(255,255,255,0.85);
        }

        /* BOTONES */

        .btn-custom{

            border:none;

            border-radius:12px;

            padding:12px;

            font-weight:600;
        }

        /* FOOTER */

        .footer{

            color:rgba(255,255,255,0.8);

            margin-top:40px;
        }

        @media(max-width:768px){

            .glass-container{

                padding:25px;
            }

            .titulo{

                font-size:2rem;
            }

            .subtitulo{

                font-size:1rem;
            }

        }

    </style>

</head>

<body>

<div class="glass-container">

    <!-- ENCABEZADO -->

    <div class="text-center">

        <img
            src="{{ url_for('static', filename='img/logo.png') }}"
            class="logo"
            alt="Logo">

        <h1 class="titulo">
            Sistema de Gestión Académica
        </h1>

        <p class="subtitulo">
            Colegio Yunguyo Fe y Alegría
        </p>

        <div class="linea"></div>

    </div>

    <!-- TARJETAS -->

    <div class="row g-4 mt-4">

        <!-- ESTUDIANTE -->

        <div class="col-md-4">

            <div class="card card-glass text-center p-4">

                <i class="bi bi-mortarboard-fill icono text-primary"></i>

                <h3 class="mt-3">
                    Estudiante
                </h3>

                <hr class="text-light">

                <p>
                    Consultar notas, materias y profesores.
                </p>

                <a href="/login_estudiante"
                   class="btn btn-primary btn-custom w-100 mt-3">

                    Ingresar

                </a>

            </div>

        </div>

        <!-- PROFESOR -->

        <div class="col-md-4">

            <div class="card card-glass text-center p-4">

                <i class="bi bi-person-workspace icono text-success"></i>

                <h3 class="mt-3">
                    Profesor
                </h3>

                <hr class="text-light">

                <p>
                    Gestión de estudiantes y notas.
                </p>

                <a href="/login_profesor"
                   class="btn btn-success btn-custom w-100 mt-3">

                    Ingresar

                </a>

            </div>

        </div>

        <!-- DIRECTOR -->

        <div class="col-md-4">

            <div class="card card-glass text-center p-4">

                <i class="bi bi-person-badge-fill icono text-danger"></i>

                <h3 class="mt-3">
                    Director
                </h3>

                <hr class="text-light">

                <p>
                    Administración general del sistema.
                </p>

                <a href="/login_director"
                   class="btn btn-danger btn-custom w-100 mt-3">

                    Ingresar

                </a>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <div class="text-center footer">

        <hr class="text-light">

        <small>
            © 2026 Sistema Académico - Colegio Yunguyo Fe y Alegría
        </small>

    </div>

</div>

</body>
</html>
