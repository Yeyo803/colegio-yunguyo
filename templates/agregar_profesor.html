<!DOCTYPE html>
<html>
<head>

    <title>Agregar Profesor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background-image:
                linear-gradient(
                    rgba(0,0,0,0.45),
                    rgba(0,0,0,0.45)
                ),
                url("{{ url_for('static', filename='img/fondo.jpg') }}");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;
        }

        .glass-card{

            width:100%;
            max-width:700px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.25);

            border-radius:25px;

            padding:40px;

            color:white;

            box-shadow:0 8px 32px rgba(0,0,0,0.30);
        }

        h2{
            text-align:center;
            font-weight:700;
            margin-bottom:25px;
        }

        label{
            font-weight:500;
            color:rgba(255,255,255,0.9);
        }

        .form-control,
        .form-select{

            background:rgba(255,255,255,0.15);
            border:none;
            color:white;
        }

        .form-control:focus,
        .form-select:focus{
            box-shadow:none;
            border:1px solid rgba(255,255,255,0.4);
        }

        option{
            color:black;
        }

        button{
            border:none;
            border-radius:12px;
            padding:12px;
            font-weight:600;
        }

    </style>

</head>

<body>

<div class="glass-card">

    <h2>➕ Agregar Profesor</h2>

    <form method="POST" action="/guardar_profesor">

        <label>Nombre</label>
        <input type="text" name="nombre" class="form-control mb-3" required>

        <label>Apellido</label>
        <input type="text" name="apellido" class="form-control mb-3" required>

        <label>CI</label>
        <input type="text" name="ci" class="form-control mb-3" required>

        <label>Contraseña</label>
        <input type="password" name="password" class="form-control mb-3" required>

        <label>Materias</label>
        <select name="materias" class="form-select mb-3" multiple required>
            {% for m in materias %}
                <option value="{{ m[0] }}">{{ m[1] }}</option>
            {% endfor %}
        </select>

        <label>Cursos</label>
        <select name="cursos" class="form-select mb-4" multiple required>
            {% for c in cursos %}
                <option value="{{ c[0] }}">{{ c[1] }} {{ c[2] }}</option>
            {% endfor %}
        </select>

        <button class="btn btn-success w-100">
            💾 Guardar Profesor
        </button>

    </form>

</div>

</body>
</html>
