<!DOCTYPE html>
<html>
<head>

    <title>Delegados y Codelegados</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background-image:
                linear-gradient(
                    rgba(0,0,0,0.45),
                    rgba(0,0,0,0.45)
                ),
                url("{{ url_for('static', filename='img/fondo.jpg') }}");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            display:flex;
            justify-content:center;
            align-items:flex-start;

            padding:30px;
        }

        /* GLASS CONTAINER */

        .glass-container{

            width:100%;
            max-width:1000px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.25);

            border-radius:30px;

            padding:40px;

            color:white;

            box-shadow:0 8px 32px rgba(0,0,0,0.30);
        }

        h1{
            text-align:center;
            font-weight:700;
            margin-bottom:25px;
        }

        table{
            color:white;
        }

        .table thead{
            background:rgba(0,0,0,0.4);
        }

        .table tbody tr:hover{
            background:rgba(255,255,255,0.08);
            transition:0.2s;
        }

        .badge-cargo{
            padding:6px 10px;
            border-radius:10px;
            font-weight:600;
        }

    </style>

</head>

<body>

<div class="glass-container">

    <h1>🏆 Delegados y Codelegados</h1>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
            <tr>
                <th>Curso</th>
                <th>Cargo</th>
                <th>Nombre</th>
            </tr>
        </thead>

        <tbody>

            {% for r in representantes %}

            <tr>

                <td>{{ r[0] }} {{ r[1] }}</td>

                <td>
                    <span class="badge bg-success badge-cargo">
                        {{ r[4] }}
                    </span>
                </td>

                <td>{{ r[2] }} {{ r[3] }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
