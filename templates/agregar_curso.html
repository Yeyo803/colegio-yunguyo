<!DOCTYPE html>
<html>
<head>

    <title>Agregar Curso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background-image:
                linear-gradient(
                    rgba(0,0,0,0.45),
                    rgba(0,0,0,0.45)
                ),
                url("{{ url_for('static', filename='img/fondo.jpg') }}");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;
        }

        .glass-card{

            width:100%;
            max-width:500px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.25);

            border-radius:25px;

            padding:40px;

            color:white;

            box-shadow:0 8px 32px rgba(0,0,0,0.30);
        }

        h2{
            text-align:center;
            font-weight:700;
            margin-bottom:25px;
        }

        .form-control{
            background:rgba(255,255,255,0.15);
            border:none;
            color:white;
        }

        .form-control:focus{
            box-shadow:none;
            border:1px solid rgba(255,255,255,0.4);
        }

        option{
            color:black;
        }

        button{
            border:none;
            border-radius:12px;
            padding:12px;
            font-weight:600;
        }

    </style>

</head>

<body>

<div class="glass-card">

    <h2>➕ Agregar Curso</h2>

    <form method="POST" action="/guardar_curso">

        <input class="form-control mb-3"
               name="grado"
               placeholder="Grado (ej: 1ro, 2do)"
               required>

        <input class="form-control mb-3"
               name="paralelo"
               placeholder="Paralelo (A, B, C)"
               required>

        <button class="btn btn-success w-100">
            💾 Guardar Curso
        </button>

    </form>

</div>

</body>
</html>
