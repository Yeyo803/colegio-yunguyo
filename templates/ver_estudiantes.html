<!DOCTYPE html>
<html>
<head>

    <title>Lista de Estudiantes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background-image:
                linear-gradient(
                    rgba(0,0,0,0.45),
                    rgba(0,0,0,0.45)
                ),
                url("{{ url_for('static', filename='img/fondo.jpg') }}");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            display:flex;
            justify-content:center;
            align-items:flex-start;

            padding:30px;
        }

        .glass-container{

            width:100%;
            max-width:1200px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.25);

            border-radius:30px;

            padding:40px;

            color:white;

            box-shadow:0 8px 32px rgba(0,0,0,0.30);
        }

        h1{
            text-align:center;
            font-weight:700;
            margin-bottom:20px;
        }

        .form-control{
            background:rgba(255,255,255,0.15);
            border:none;
            color:white;
        }

        .form-control:focus{
            box-shadow:none;
            border:1px solid rgba(255,255,255,0.4);
        }

        option{
            color:black;
        }

        table{
            color:white;
        }

        .table thead{
            background:rgba(0,0,0,0.4);
        }

        .table tbody tr:hover{
            background:rgba(255,255,255,0.08);
            transition:0.2s;
        }

        h3{
            background:rgba(13,110,253,0.8);
            color:white;
            padding:10px;
            border-radius:10px;
            margin-top:25px;
        }

        .btn{
            border-radius:10px;
        }

    </style>

</head>

<body>

<div class="glass-container">

    <h1>📚 Lista de Estudiantes</h1>

    <form method="GET" action="/ver_estudiantes" class="mb-3">

        <div class="input-group">

            <input type="text" name="buscar" class="form-control" placeholder="Buscar por CI">

            <button type="submit" class="btn btn-primary">
                🔍 Buscar
            </button>

        </div>

    </form>

    <div class="mb-3">

        <a href="/agregar_estudiante" class="btn btn-success">
            ➕ Agregar Estudiante
        </a>

        <a href="/agregar_curso" class="btn btn-secondary">
            🏫 Agregar Curso
        </a>

    </div>

    {% for curso, lista in cursos.items() %}

        <h3>{{ curso }}</h3>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>CI</th>
                    <th>Apellido</th>
                    <th>Nombre</th>
                    <th>Fecha de Ingreso</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody>

                {% for e in lista %}
                <tr>

                    <td>{{ e[0] }}</td>
                    <td>{{ e[1] }}</td>
                    <td>{{ e[2] }}</td>
                    <td>{{ e[3] }}</td>
                    <td>{{ e[4] }}</td>

                    <td>

                        <a href="/editar_estudiante/{{ e[0] }}" class="btn btn-warning btn-sm">
                            ✏️ Editar
                        </a>

                        <a href="/eliminar_estudiante/{{ e[0] }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Está seguro de eliminar este estudiante?')">
                            🗑️ Eliminar
                        </a>

                    </td>

                </tr>
                {% endfor %}

            </tbody>

        </table>

    {% endfor %}

</div>

</body>
</html>
