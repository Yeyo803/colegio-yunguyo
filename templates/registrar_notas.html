<!DOCTYPE html>
<html>
<head>

    <title>Registrar Notas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background-image:
                linear-gradient(
                    rgba(0,0,0,0.45),
                    rgba(0,0,0,0.45)
                ),
                url("{{ url_for('static', filename='img/fondo.jpg') }}");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            display:flex;
            justify-content:center;
            align-items:flex-start;

            padding:30px;
        }

        .glass-container{

            width:100%;
            max-width:900px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.25);

            border-radius:30px;

            padding:40px;

            color:white;

            box-shadow:0 8px 32px rgba(0,0,0,0.30);
        }

        h1{
            text-align:center;
            font-weight:700;
            margin-bottom:25px;
        }

        label{
            font-weight:600;
            margin-top:10px;
        }

        .form-control, .form-select{
            background:rgba(255,255,255,0.15);
            border:none;
            color:white;
        }

        .form-control:focus, .form-select:focus{
            box-shadow:none;
            border:1px solid rgba(255,255,255,0.4);
        }

        option{
            color:black;
        }

        button{
            border:none;
            border-radius:12px;
            padding:12px;
            font-weight:600;
        }

    </style>

</head>

<body>

<div class="glass-container">

    <h1>📝 Registro de Notas</h1>

    <form action="/guardar_nota" method="POST">

        <label>Curso</label>
        <select id="curso" class="form-select">
            <option value="">Seleccione un curso</option>
            {% for c in cursos %}
            <option value="{{ c[0] }}">{{ c[1] }} {{ c[2] }}</option>
            {% endfor %}
        </select>

        <label>Estudiante</label>
        <select name="id_estudiante" id="estudiante" class="form-select">
            {% for e in estudiantes %}
            <option value="{{ e[0] }}" data-curso="{{ e[3] }}">
                {{ e[1] }} {{ e[2] }}
            </option>
            {% endfor %}
        </select>

        <label>Materia</label>
        <select name="id_materia" class="form-select">
            {% for m in materias %}
            <option value="{{ m[0] }}">{{ m[1] }}</option>
            {% endfor %}
        </select>

        <label>Tipo de Nota</label>
        <select name="tipo_nota" id="tipo_nota" class="form-select">
            <option value="examen">Examen</option>
            <option value="practica">Práctica</option>
        </select>

        <label>Evaluación</label>
        <select name="evaluacion" id="evaluacion" class="form-select">
            <option value="1">1ra Evaluación</option>
            <option value="2">2da Evaluación</option>
            <option value="3">3ra Evaluación</option>
        </select>

        <label>Nota</label>
        <input type="number" step="0.01" min="0" max="100"
               name="nota" class="form-control" required>

        <br>

        <button type="submit" class="btn btn-success w-100 mt-3">
            💾 Guardar Nota
        </button>

    </form>

</div>

<script>

const tipoNota = document.getElementById("tipo_nota");
const evaluacion = document.getElementById("evaluacion");

tipoNota.addEventListener("change", function() {

    if (this.value === "practica") {

        evaluacion.innerHTML = `
            <option value="1">1ra Práctica</option>
            <option value="2">2da Práctica</option>
            <option value="3">3ra Práctica</option>
        `;

    } else {

        evaluacion.innerHTML = `
            <option value="1">1ra Evaluación</option>
            <option value="2">2da Evaluación</option>
            <option value="3">3ra Evaluación</option>
        `;

    }

});

const curso = document.getElementById("curso");
const estudiante = document.getElementById("estudiante");

curso.addEventListener("change", function() {

    const cursoSeleccionado = this.value;

    for (let opcion of estudiante.options) {

        if (
            opcion.dataset.curso === cursoSeleccionado ||
            cursoSeleccionado === ""
        ) {
            opcion.style.display = "";
        } else {
            opcion.style.display = "none";
        }

    }

});

</script>

</body>
</html>
